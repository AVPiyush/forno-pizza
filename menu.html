<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍕</text></svg>">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu — Forno°</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/menu.css">
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="navbar-logo">Forno<span>°</span></a>
    <ul class="navbar-nav">
      <li>
        <a href="index.html" class="nav-link">
          <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
          </svg>
          <span>Home</span>
        </a>
      </li>
      <li>
        <a href="menu.html?cat=veg" class="nav-link">
          <span class="nav-dot veg"></span>
          <span>Veg</span>
        </a>
      </li>
      <li>
        <a href="menu.html?cat=nonveg" class="nav-link">
          <span class="nav-dot nonveg"></span>
          <span>Non-Veg</span>
        </a>
      </li>
      <li>
        <a href="menu.html?cat=deals" class="nav-link">
          <span>🔥</span>
          <span>Hot Deals</span>
        </a>
      </li>
      <li>
        <a href="cart.html" class="nav-link nav-cart">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13l-1.4 7h12.8M7 13L5.4 5M17 21a1 1 0 100-2 1 1 0 000 2zm-10 0a1 1 0 100-2 1 1 0 000 2z"/>
          </svg>
          <span>Cart</span>
          <span class="cart-badge">0</span>
        </a>
      </li>
      <li>
        <a href="#" class="nav-link nav-profile" title="Profile">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
          </svg>
        </a>
      </li>
    </ul>
  </nav>

  <div class="menu-page">
    <div class="page-header">
      <h1 id="pageTitle">Our Menu</h1>
      <p id="pageSub">Every pizza tells a story.</p>
    </div>

    <div class="view-toggle">
      <button class="toggle-btn active" id="wheelToggle">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="9"/>
          <circle cx="12" cy="12" r="3"/>
          <path d="M12 3v3M12 18v3M3 12h3M18 12h3"/>
        </svg>
        Wheel Scroll
      </button>
      <button class="toggle-btn" id="listToggle">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
        List View
      </button>
    </div>

    <div class="wheel-view" id="wheelView">
      <div class="wheel-detail" id="wheelDetail"></div>
      <div class="wheel-counter" id="wheelCounter">1 / 6</div>
      <div class="wheel-nav">
        <button class="wheel-arrow" id="prevBtn" aria-label="Previous pizza">
          <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
          </svg>
        </button>
        <button class="wheel-arrow" id="nextBtn" aria-label="Next pizza">
          <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
          </svg>
        </button>
      </div>
      <div class="wheel-stage" id="wheelStage"></div>
    </div>

    <div class="list-view" id="listView">
      <div class="pizza-grid" id="pizzaGrid"></div>
    </div>
  </div>

  <footer class="footer-strip">
    © 2025 <span>Forno°</span> — Artisan Pizza. Made with <span>♥</span> and fire.
  </footer>

  <!-- CUSTOMIZER MODAL -->
  <div class="modal-overlay" id="custOverlay">
    <div class="customizer-modal" id="custModal"></div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/menu.js"></script>
</body>
</html>
