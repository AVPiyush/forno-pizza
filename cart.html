<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍕</text></svg>">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Cart — Forno°</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/cart.css">
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="navbar-logo">Forno<span>°</span></a>
    <ul class="navbar-nav">
      <li>
        <a href="index.html" class="nav-link">
          <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
          </svg>
          <span>Home</span>
        </a>
      </li>
      <li>
        <a href="menu.html?cat=veg" class="nav-link">
          <span class="nav-dot veg"></span>
          <span>Veg</span>
        </a>
      </li>
      <li>
        <a href="menu.html?cat=nonveg" class="nav-link">
          <span class="nav-dot nonveg"></span>
          <span>Non-Veg</span>
        </a>
      </li>
      <li>
        <a href="menu.html?cat=deals" class="nav-link">
          <span>🔥</span>
          <span>Hot Deals</span>
        </a>
      </li>
      <li>
        <a href="cart.html" class="nav-link nav-cart active">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13l-1.4 7h12.8M7 13L5.4 5M17 21a1 1 0 100-2 1 1 0 000 2zm-10 0a1 1 0 100-2 1 1 0 000 2z"/>
          </svg>
          <span>Cart</span>
          <span class="cart-badge">0</span>
        </a>
      </li>
      <li>
        <a href="#" class="nav-link nav-profile" title="Profile">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
          </svg>
        </a>
      </li>
    </ul>
  </nav>

  <div class="cart-page">
    <div class="cart-layout" id="cartLayout">

      <div class="cart-items-section">
        <h2>Your Order</h2>

        <div class="cart-empty" id="cartEmpty" style="display:none">
          <div class="empty-icon">🍕</div>
          <h3>Your cart is empty</h3>
          <p>Nothing here yet — let's fix that.</p>
          <a href="menu.html?cat=veg" class="btn-primary" style="display:inline-flex">Browse Menu →</a>
        </div>

        <div id="cartItemsList"></div>

        
      </div>

      <aside class="order-summary" id="orderSummary">
        <h3>Order Summary</h3>
        <div class="summary-row">
          <span>Subtotal</span>
          <span id="subtotalVal">₹0</span>
        </div>
        <div class="summary-row">
          <span>Delivery</span>
          <span id="deliveryVal">₹49</span>
        </div>
        <div class="summary-row">
          <span>Tax (5%)</span>
          <span id="taxVal">₹0</span>
        </div>
        <div class="summary-row total">
          <span>Total</span>
          <span id="totalVal">₹0</span>
        </div>

        <div class="promo-wrap">
          <input class="promo-input" type="text" placeholder="Promo code" id="promoInput">
          <button class="promo-apply" id="promoApplyBtn" onclick="applyPromo()">Apply</button>
        </div>

        <button class="checkout-btn" id="checkoutBtn" onclick="placeOrder()">
          Place Order
        </button>

        <div class="trust-badges">
          <span class="trust-badge">🔒 Secure</span>
          <span class="trust-badge">⚡ Fast Delivery</span>
          <span class="trust-badge">✓ Fresh</span>
        </div>
      </aside>

    </div>
  </div>
  <div class="order-confirm" id="orderConfirm" style="position:fixed;inset:0;z-index:999;background:var(--black);display:none;align-items:center;justify-content:center;flex-direction:column;overflow-y:auto;padding:40px;"></div>
  <footer class="footer-strip">
    © 2025 <span>Forno°</span> — Artisan Pizza. Made with <span>♥</span> and fire.
  </footer>

  <script src="js/data.js"></script>
  <script src="js/cart.js"></script>
  <script>
    const DELIVERY = 49;
    const TAX_RATE = 0.05;
    let promoApplied = false;

    function formatINR(amount) {
      return '₹' + Math.round(amount).toLocaleString('en-IN');
    }

    function renderCart() {
      const list = document.getElementById('cartItemsList');
      const empty = document.getElementById('cartEmpty');
      const checkoutBtn = document.getElementById('checkoutBtn');

      if (Cart.items.length === 0) {
        list.innerHTML = '';
        empty.style.display = 'block';
        checkoutBtn.disabled = true;
        updateTotals();
        return;
      }

      empty.style.display = 'none';
      checkoutBtn.disabled = false;

      list.innerHTML = Cart.items.map(item => {
        const cartId = item.cartId || item.id;
        const safeId = cartId.replace(/[^a-zA-Z0-9_-]/g, '_');
        const toppingLine = item.toppings && item.toppings.length
          ? `<p class="ci-toppings">+ ${item.toppings.join(', ')}</p>` : '';
        const sizeLabel = item.size ? ` · ${item.size}` : '';
        return `
        <div class="cart-item" id="ci_${safeId}">
          <img class="cart-item-img" src="${item.image}" alt="${item.name}">
          <div class="cart-item-info">
            <h4>${item.cartLabel || item.name}${sizeLabel}</h4>
            <p class="ci-tagline">${item.tagline}</p>
            ${toppingLine}
            <div style="font-size:0.78rem;color:var(--text-muted);margin-top:6px">${formatINR(item.price)} each</div>
            <div class="qty-control" style="margin-top:8px">
              <button class="qty-btn" onclick="changeQty('${safeId}','${cartId}',-1)">−</button>
              <span class="qty-num">${item.qty}</span>
              <button class="qty-btn" onclick="changeQty('${safeId}','${cartId}',1)">+</button>
            </div>
          </div>
          <div class="cart-item-right">
            <div class="cart-item-price">${formatINR(item.price * item.qty)}</div>
            ${item.qty > 1 ? `<div style="font-size:0.72rem;color:var(--text-muted);text-align:right;margin-top:4px">${item.qty} × ${formatINR(item.price)}</div>` : ''}
            <button class="remove-btn" onclick="removeItem('${safeId}','${cartId}')">Remove</button>
          </div>
        </div>`;
      }).join('');

      updateTotals();
    }

    function changeQty(safeId, cartId, delta) {
      Cart.updateQty(cartId, delta);
      renderCart();
    }

    function removeItem(safeId, cartId) {
      const el = document.getElementById('ci_' + safeId);
      if (el) {
        el.style.opacity = '0';
        el.style.transform = 'translateX(20px)';
        el.style.transition = 'all 0.3s ease';
        setTimeout(() => { Cart.remove(cartId); renderCart(); }, 280);
      }
    }

    function updateTotals() {
      const sub = Cart.total();
      const discount = promoApplied ? Math.round(sub * 0.1) : 0;
      const delivery = sub > 0 ? DELIVERY : 0;
      const tax = Math.round((sub - discount) * TAX_RATE);
      const total = sub - discount + delivery + tax;

      document.getElementById('subtotalVal').textContent = formatINR(sub);
      document.getElementById('deliveryVal').textContent = sub > 0 ? formatINR(DELIVERY) : 'Free';
      document.getElementById('taxVal').textContent = formatINR(tax);
      document.getElementById('totalVal').textContent = formatINR(total);

      if (promoApplied) {
        let discRow = document.getElementById('discountRow');
        if (!discRow) {
          discRow = document.createElement('div');
          discRow.id = 'discountRow';
          discRow.className = 'summary-row';
          discRow.style.color = '#4caf50';
          document.getElementById('taxVal').parentElement.insertAdjacentElement('beforebegin', discRow);
        }
        discRow.innerHTML = `<span>Promo (10% off)</span><span>-${formatINR(discount)}</span>`;
      }
    }

    function applyPromo() {
      const code = document.getElementById('promoInput').value.trim().toUpperCase();
      const btn = document.getElementById('promoApplyBtn');
      const input = document.getElementById('promoInput');

      if (promoApplied) return;

      if (code === 'FORNO10' || code === 'PIZZA10') {
        promoApplied = true;
        input.disabled = true;
        btn.textContent = '✓ Applied';
        btn.style.color = '#4caf50';
        btn.style.borderColor = '#4caf50';
        updateTotals();
      } else {
        input.style.borderColor = '#e53935';
        input.placeholder = 'Invalid code';
        input.value = '';
        setTimeout(() => {
          input.style.borderColor = '';
          input.placeholder = 'Promo code';
        }, 1800);
      }
    }

    function placeOrder() {
      const layout = document.getElementById('cartLayout');
      const confirm = document.getElementById('orderConfirm');

      layout.style.opacity = '0';
      layout.style.transition = 'opacity 0.5s ease';

      setTimeout(() => {
        layout.style.display = 'none';

        const orderNum = 'FRN' + Math.floor(Math.random() * 90000 + 10000);
        const eta = Math.floor(Math.random() * 10 + 25);

        confirm.innerHTML = `
          <div class="confirm-icon">🎉</div>
          <h2>Order Confirmed!</h2>
          <p style="font-family:var(--ff-serif);font-style:italic;color:var(--text-muted);font-size:1.05rem;margin-bottom:6px">
            Your pizza is being lovingly crafted in our wood-fired oven.
          </p>
          <div style="
            display:inline-flex;flex-direction:column;align-items:center;gap:6px;
            background:var(--charcoal);border:1px solid var(--border);border-radius:16px;
            padding:24px 40px;margin:24px auto;
          ">
            <span style="font-size:0.7rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--text-muted)">Order Number</span>
            <span style="font-family:var(--ff-display);font-size:2rem;font-weight:900;color:var(--amber)">${orderNum}</span>
          </div>
          <div style="display:flex;gap:30px;justify-content:center;flex-wrap:wrap;margin-bottom:32px;">
            <div style="text-align:center">
              <div style="font-size:1.6rem;margin-bottom:4px">🔥</div>
              <div style="font-size:0.75rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-muted)">Status</div>
              <div style="font-family:var(--ff-display);font-size:1rem;color:var(--cream);margin-top:2px">Preparing</div>
            </div>
            <div style="width:1px;background:var(--border)"></div>
            <div style="text-align:center">
              <div style="font-size:1.6rem;margin-bottom:4px">🛵</div>
              <div style="font-size:0.75rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-muted)">Est. Delivery</div>
              <div style="font-family:var(--ff-display);font-size:1rem;color:var(--cream);margin-top:2px">${eta} mins</div>
            </div>
            <div style="width:1px;background:var(--border)"></div>
            <div style="text-align:center">
              <div style="font-size:1.6rem;margin-bottom:4px">📍</div>
              <div style="font-size:0.75rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-muted)">Delivering To</div>
              <div style="font-family:var(--ff-display);font-size:1rem;color:var(--cream);margin-top:2px">Your Address</div>
            </div>
          </div>
          <a href="index.html" class="btn-primary" style="display:inline-flex;text-decoration:none">← Back to Home</a>
          <span style="display:inline-block;width:12px"></span>
          <a href="menu.html?cat=veg" class="btn-secondary" style="display:inline-flex;text-decoration:none;margin-top:10px">Order Again</a>
        `;
        confirm.style.display = 'flex';
        Cart.clear();
        setTimeout(() => {
          window.scrollTo({ top: 0, behavior: 'smooth' });
        }, 50);
      }, 500);
    }

    document.addEventListener('DOMContentLoaded', () => {
      Cart.load();
      renderCart();
    });
  </script>
</body>
</html>
